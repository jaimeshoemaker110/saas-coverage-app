<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Coverage Lookup</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 SaaS Coverage Lookup</h1>
            <p class="subtitle">Find customers, products, and targets by coverage ID</p>
        </header>

        <main>
            <!-- Search Section -->
            <section class="search-section">
                <div class="search-box">
                    <div class="checkbox-header">
                        <label>Select Coverage ID(s):</label>
                        <div class="checkbox-controls">
                            <button id="select-all-btn" class="btn-link">Select All</button>
                            <button id="clear-btn" class="btn-link">Clear All</button>
                        </div>
                    </div>
                    <div class="checkbox-container" id="coverage-checkboxes">
                        <!-- Checkboxes will be populated by JavaScript -->
                    </div>
                    <div class="button-group">
                        <button id="search-btn" class="btn btn-primary" disabled>Search Selected</button>
                    </div>
                </div>
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Loading data...</p>
                </div>
            </section>

            <!-- Results Section -->
            <section id="results-section" class="results-section" style="display: none;">
                <div class="results-header">
                    <h2>Results for <span id="coverage-count">1</span> Coverage ID(s)</h2>
                    <div class="export-buttons">
                        <button id="export-csv-btn" class="btn btn-secondary">
                            📄 Export CSV
                        </button>
                        <button id="export-excel-btn" class="btn btn-secondary">
                            📊 Export Excel
                        </button>
                    </div>
                </div>

                <!-- Results Container for Multiple Coverage IDs -->
                <div id="results-container">
                    <!-- Results will be dynamically inserted here -->
                </div>

                <!-- Overall Summary Stats -->
                <div class="summary-stats overall-summary">
                    <h3>Overall Summary</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-label">Total Coverage IDs:</span>
                            <span id="total-coverages" class="stat-value">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Total Customers:</span>
                            <span id="total-customers" class="stat-value">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Total Products:</span>
                            <span id="total-products" class="stat-value">0</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Error Message -->
            <div id="error-message" class="error-message" style="display: none;">
                <p id="error-text"></p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 SaaS Coverage Lookup Application</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
