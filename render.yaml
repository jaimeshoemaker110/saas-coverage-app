services:
  - type: web
    name: saas-coverage-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: saas-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

